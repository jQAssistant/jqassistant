---
name: CI

on:
  push:
    branches:
      - "master"
      - "bugfix/*"
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - "master"
      - "bugfix/*"
  workflow_dispatch: { }
  workflow_call:
    inputs:
      java_version:
        description: Java version to use for running Sonar and publishing docs & artifacts
        type: string
        required: false
        default: 17
      java_test_versions:
        description: Java versions to use for testing the project
        type: string
        required: false
        default: '[11, 25]'
      publish_arc42:
        description: Whether to attempt publishing snapshots. When false, the workflow will only run build.
        type: boolean
        default: true
        required: false
      pages:
        description: Path expression for GitHub pages to upload.
        type: string
        required: false

concurrency:
  group: build-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: jqassistant-tooling/jqassistant-github-actions/.github/workflows/ci.yml@main
    with:
      publish_snapshots: true
      pages: "./manual/target/generated-docs/"
    secrets:
      ossrh_username: ${{ secrets.OSSRH_USERNAME }}
      ossrh_password: ${{ secrets.OSSRH_PASSWORD }}
      ossrh_signing_key: ${{ secrets.OSSRH_SIGNING_KEY }}
      ossrh_signing_password: ${{ secrets.OSSRH_SIGNING_PASSWORD }}
      sonar_token: ${{ secrets.SONAR_TOKEN }}

  publish-snapshots:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - uses: ts-graphviz/setup-graphviz@v1
        with:
          cache: 'maven'

      - name: Deploy GitHub Pages to arc42
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ inputs.pages }}
          destination_dir: ./arc42
          keep_files: true

      - name: Deploy GitHub Pages to report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ inputs.pages }}
          destination_dir: ./report
          keep_files: true
