---
name: CI

on:
  push:
    branches:
      - "1148-arc42-documentation-shall-be-published-to-Confluence"
      - "bugfix/*"
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - "1148-arc42-documentation-shall-be-published-to-Confluence"
      - "bugfix/*"
  workflow_dispatch: {}

concurrency:
  group: build-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: jqassistant-tooling/jqassistant-github-actions/.github/workflows/ci.yml@integration-of-sonarqube-into-jQA
    with:
      publish_snapshots: true
      pages: "./manual/target/generated-docs/"
    secrets:
      ossrh_username: ${{ secrets.OSSRH_USERNAME }}
      ossrh_password: ${{ secrets.OSSRH_PASSWORD }}
      ossrh_signing_key: ${{ secrets.OSSRH_SIGNING_KEY }}
      ossrh_signing_password: ${{ secrets.OSSRH_SIGNING_PASSWORD }}
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      confluence_username: ${{ secrets.CONFLUENCE_USERNAME }}
      confluence_password: ${{ secrets.CONFLUENCE_PASSWORD }}
