---
name: CI

on:
  workflow_call:
    inputs:
        sonar_host_url:
          type: string
          description: "URL for sonarqube results"
          default: "http://localhost/9000"
          required: false

  push:
    branches:
      - "1147-improve-sonarqube-integration-for-jqa"
      - "bugfix/*"
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - "1147-improve-sonarqube-integration-for-jqa"
      - "bugfix/*"
  workflow_dispatch: {}

concurrency:
  group: build-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: jqassistant-tooling/jqassistant-github-actions/.github/workflows/ci.yml@main
    with:
      publish_snapshots: true
      pages: "./manual/target/generated-docs/"
    secrets:
      ossrh_username: ${{ secrets.OSSRH_USERNAME }}
      ossrh_password: ${{ secrets.OSSRH_PASSWORD }}
      ossrh_signing_key: ${{ secrets.OSSRH_SIGNING_KEY }}
      ossrh_signing_password: ${{ secrets.OSSRH_SIGNING_PASSWORD }}
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      sonar_projectKey: ${{ secrets.SONAR_PROJECTKEY }}
      sonar_host_url: ${{ secrets.SONAR_HOST_URL }}


